<script>
function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (senha !== "123456") {
    alert("Senha incorreta");
    return;
  }

  if (email === "andre@email.com") {
    window.location.href = "https://seusite.vercel.app/?aluno=andre";
  } 
  else if (email === "joao@email.com") {
    window.location.href = "https://seusite.vercel.app/?aluno=joao";
  } 
  else {
    alert("E-mail não cadastrado");
  }
}
</script>
